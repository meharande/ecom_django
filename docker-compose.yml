version: '3.9'

services:
  db:
    image: postgres:15
    container_name: ecom_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ecom_redis
    ports:
      - 6379:6379

  web:
    build: 
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: myshop
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - 8000:8000
    volumes:
      - .:/app
    env_file:
      - ./.env
    depends_on:
      - db
      - redis

  rabbitmq:
    image: rabbitmq:3-management
    ports: 
      - "5672:5672"
      - "15672:15672"

  celery_worker:
    build: 
      context: .
      dockerfile: docker/django/Dockerfile
    command: celery -A config worker -l info
    volumes:
     - .:/app
    env_file:
      - ./.env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      - db
      - redis
      - rabbitmq
      - web

  flower:
    image: mher/flower:2.0
    command: ['celery', '--broker=amqp://guest:guest@rabbitmq:5672/', 'flower']
    environment:
      - FLOWER_PORT=5555
      - FLOWER_PERSISTENT=True
      - FLOWER_STATE_SAVE_INTERVAL=10000
    ports:
      - 5555:5555
    volumes:
      - ./flower:/app/flower
    depends_on:
      - rabbitmq
      - redis 
      - celery_worker
      - web
  
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: meharande@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Mehar@123
    ports:
      - "8080:80" # Host_port:Container_port
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

